<div id="history" class="section-content" style="display: none;">
    <div class="dashboard-header d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-secondary"><i class="fa fa-history mr-2"></i>History</h2>
    </div>

    <div class="row">
        <!-- Transactions Folder -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <i class="fa fa-folder-open mr-2"></i> Transactions
                </div>
                <div class="card-body">
                    <div id="history-transaction-buttons" class="d-flex flex-wrap gap-2" style="gap: 8px;"></div>
                    <div id="history-transaction-loading" class="text-muted">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Products Folder -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <i class="fa fa-folder-open mr-2"></i> Products
                </div>
                <div class="card-body">
                    <div id="history-product-buttons" class="d-flex flex-wrap gap-2" style="gap: 8px;"></div>
                    <div id="history-product-loading" class="text-muted">Loading...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal: View / Add / Edit Transaction (Box) for History -->
<div class="modal fade" id="historyBoxModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Box Entry: <span id="historyModalBoxName">New Box</span></h5>
                <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="historyModalBoxId" name="historyModalBoxId" value="">
                <div class="form-group">
                    <label for="historyModalBoxNameInput">Box/Customer Name</label>
                    <input type="text" id="historyModalBoxNameInput" name="historyModalBoxNameInput" class="form-control" placeholder="Enter name..." required>
                </div>
                <div style="max-height: 400px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 4px;">
                    <table class="table table-sm table-striped mb-0">
                        <thead class="thead-light" style="position: sticky; top: 0;">
                            <tr>
                                <th>Product Name</th>
                                <th style="width: 120px;">Qty</th>
                                <th style="width: 60px;" class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="historyBoxProductList"></tbody>
                    </table>
                </div>
                <button type="button" class="btn btn-outline-primary btn-block mt-3" onclick="addHistoryProductRow()">
                    <i class="fa fa-plus-circle"></i> Add Product to List
                </button>
            </div>
            <div class="modal-footer">
                <div class="mr-auto">
                    <strong class="text-primary">Total Price: <span id="historyModalTotalPrice">Php 0.00</span></strong>
                </div>
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                <button type="button" class="btn btn-success" onclick="submitHistoryBoxEntry()">Validate</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Add / Edit Product for History -->
<div class="modal fade" id="historyProductEditModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <form id="historyProductForm">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="historyModalProductTitle">Product Validation Form</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="historyProductId" name="historyProductId">
                    <div class="form-group">
                        <label for="historyProdName">Product Name:</label>
                        <input type="text" name="historyProdName" id="historyProdName" class="form-control" autocomplete="off" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label for="historyProdCategory">Category:</label>
                            <select name="historyProdCategory" id="historyProdCategory" class="form-control">
                                <option value="Smoked">Smoked</option>
                                <option value="Dried">Dried</option>
                            </select>
                        </div>
                        <div class="form-group col-md-6">
                            <label for="historyProdUnit">Weight Unit:</label>
                            <select name="historyProdUnit" id="historyProdUnit" class="form-control">
                                <option value="kg">Kilograms (kg)</option>
                                <option value="g">Grams (g)</option>
                                <option value="pcs">Pieces (pcs)</option>
                                <option value="pack">Pack</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label for="historyProdPrice">Price:</label>
                            <input type="number" step="0.01" name="historyProdPrice" id="historyProdPrice" class="form-control" required>
                        </div>
                        <div class="form-group col-md-6">
                            <label for="historyProdStock">Stock Quantity:</label>
                            <input type="number" name="historyProdStock" id="historyProdStock" class="form-control" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="submitHistoryProduct()">Validate</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Transaction Modal for Viewing (List) and Editing/Deleting -->
<div class="modal fade" id="historyTransactionModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Transaction History: <span id="historyTransSheetLabel"></span></h5>
                <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
                <div id="historyTransTableContainer"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                <button type="button" class="btn btn-success" id="historyTransExportExcel">Save as Excel</button>
                <button type="button" class="btn btn-warning" id="historyTransRestoreBtn" style="display:none;">Restore to Dashboard</button>
            </div>
        </div>
    </div>
</div>

<!-- Product Modal for Viewing (List) and Editing/Deleting -->
<div class="modal fade" id="historyProductModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Product History: <span id="historyProdSheetLabel"></span></h5>
                <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
                <div id="historyProdTableContainer"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                <button type="button" class="btn btn-success" id="historyProdExportExcel">Save as Excel</button>
                <button type="button" class="btn btn-warning" id="historyProdRestoreBtn" style="display:none;">Restore to Dashboard</button>
            </div>
        </div>
    </div>
</div>
